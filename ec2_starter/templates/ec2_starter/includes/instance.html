{% load static %}
{% load ec2_filters %}

<li class="instance-item"
    data-instance-name="{{ instance.name|slugify }}"
    data-status="{{ instance.status }}"
    data-public-ip="{{ instance.public_ip|default:'' }}"
    data-time-remaining="{{ instance.time_remaining|default:'' }}">
	<div class="instance">
		<div class="left">
			<h2>{{ instance.name|pretty_name }}</h2>
			<p>{{ instance.description }}</p>
			<div class="button-wrapper">
				<button class="start-instance btn-start" data-instance-name="{{ instance.name }}">Start</button>
				<button id="{{ instance.name|slugify }}-view-site" class="btn-view-site hidden" data-url="">View Site</button>
			</div>
		</div>
		<div class="right">
			<div class="status-wrapper">
				<div class="individual-status">
					<span class="status-label">EC2 Instance</span>
					{% if instance.status == 'pending' %}
					<span id="{{ instance.name|slugify }}-status"
					      class="badge status-pending"><span class="badge-dot"></span>Starting...</span>
					{% else %}
					<span id="{{ instance.name|slugify }}-status"
					      class="badge {{ instance.status|default:'unknown'|status_class }}"><span class="badge-dot"></span>{{ instance.status|default:"Unknown"|title }}</span>
					{% endif %}
				</div>
				<div class="individual-status hidden" id="{{ instance.name|slugify }}-app-status-wrapper">
					<span class="status-label">Application</span>
					<span id="{{ instance.name|slugify }}-app-status" class="badge status-pending"><span class="badge-dot"></span>Checking...</span>
				</div>
			</div>
			<div id="{{ instance.name|slugify }}-time-remaining-wrapper" class="time-remaining-section hidden">
				<div class="time-remaining-header">
					<span class="time-remaining-label">Time remaining</span>
					<span id="{{ instance.name|slugify }}-time-remaining" class="time-remaining-value"></span>
				</div>
				<div class="progress-bar">
					<div id="{{ instance.name|slugify }}-progress-fill" class="progress-fill" style="width: 0%"></div>
				</div>
			</div>
		</div>
	</div>
</li>
